  };
  firebase.initializeApp(firebaseConfig);
  const fbDB = firebase.database();
  const FB_ROOT = 'obra_data';
  function fbLoad(key, defVal) {
    return fbDB.ref(FB_ROOT + '/' + key).once('value').then(snap => {
      const v = snap.val(); return v != null ? v : defVal;
    }).catch(() => defVal);
  }
  function fbSave(key, data) {
    return fbDB.ref(FB_ROOT + '/' + key).set(data);

<script src="partidas_data.js"></script>
<script>
const MESES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const DIAS_SEM=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
function fmtFecha(fs){
  const d=new Date(fs+'T00:00:00');
  return `${DIAS_SEM[d.getDay()].charAt(0).toUpperCase()+DIAS_SEM[d.getDay()].slice(1)} ${String(d.getDate()).padStart(2,'0')} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let actividades=[];
let parrafosEditados={};
let cambiosPendientes=false;

// ================================================================
// DATOS EXTRA POR DÍA (Firebase)
// ================================================================
let personalData={};     // { "2026-02-01": { tecnico: [{rol,cant},...], obrero: [{cat,cant},...] } }
let equiposData={};      // { "2026-02-01": [{nombre,cant},...] }
let observacionesData={}; // { "2026-02-01": "texto" }

// Roles fijos
const ROLES_TECNICO = [
  'Ing. Residente','Administrador','Almacenero',
  'Ing. de Seguridad','Ing. Ambiental','Ing. Calidad',
  'Especialista En Procesos De Selección','Topógrafo'
];
const CATS_OBRERO = ['Capataz','Operarios','Oficiales','Oficiales Guardianes','Peones'];
const EQUIPOS_DEFAULT = ['Vibradora Eléctrica','Mezcladora Eléctrica'];

// Obtener día anterior en formato YYYY-MM-DD
function diaAnterior(fecha){
  const d=new Date(fecha+'T00:00:00');
  d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}

function getPersonalDia(fecha){
  if(personalData[fecha]) return personalData[fecha];
  // Buscar día anterior con datos (hasta 30 días atrás)
  let f=fecha;
  for(let i=0;i<30;i++){
    f=diaAnterior(f);
    if(personalData[f]) return JSON.parse(JSON.stringify(personalData[f]));
  }
  return {
    tecnico: ROLES_TECNICO.map(r=>({rol:r,cant:0})),
    obrero: CATS_OBRERO.map(c=>({cat:c,cant:0}))
  };
}
function getEquiposDia(fecha){
  if(equiposData[fecha]) return equiposData[fecha];
  // Buscar día anterior con datos (hasta 30 días atrás)
  let f=fecha;
  for(let i=0;i<30;i++){
    f=diaAnterior(f);
    if(equiposData[f]) return JSON.parse(JSON.stringify(equiposData[f]));
  }
  return EQUIPOS_DEFAULT.map(n=>({nombre:n,cant:0}));
}
function getObservacionesDia(fecha){
  return observacionesData[fecha]||'';
}

// ================================================================
// MODAL — Editar datos del día
// ================================================================
let modalFechaActual='';

function abrirModal(fecha){
  modalFechaActual=fecha;
  document.getElementById('modal-fecha-label').textContent=fmtFecha(fecha);

  // Personal Técnico
  const pDia=getPersonalDia(fecha);
  renderTecnicoModal(pDia.tecnico);

  // Personal Obrero
  renderObreroModal(pDia.obrero);

  // Equipos
  const eqDia=getEquiposDia(fecha);
  renderEquiposModal(eqDia);

  document.getElementById('modal-dia').classList.add('active');
}

function renderTecnicoModal(lista){
  let h='';
  lista.forEach((t,i)=>{
    h+=`<div class="modal-row" data-tec-idx="${i}">
      <input type="text" value="${esc(t.rol)}" data-tec-name="${i}" placeholder="Rol técnico"/>
      <input type="number" min="0" value="${t.cant}" data-tec-cant="${i}" style="width:60px"/>
      <button class="btn-modal-remove" onclick="this.parentElement.remove()">✕</button>
    </div>`;
  });
  document.getElementById('modal-tecnico').innerHTML=h;
}

function agregarTecnicoModal(){
  const ctn=document.getElementById('modal-tecnico');
  const rows=ctn.querySelectorAll('.modal-row');
  const idx=rows.length;
  const div=document.createElement('div');
  div.className='modal-row';
  div.dataset.tecIdx=idx;
  div.innerHTML=`<input type="text" value="" data-tec-name="${idx}" placeholder="Rol técnico"/>
    <input type="number" min="0" value="0" data-tec-cant="${idx}" style="width:60px"/>
    <button class="btn-modal-remove" onclick="this.parentElement.remove()">✕</button>`;
  ctn.appendChild(div);
}

function renderObreroModal(lista){
  let h='';
  lista.forEach((o,i)=>{
    h+=`<div class="modal-row" data-ob-idx="${i}">
      <input type="text" value="${esc(o.cat)}" data-ob-name="${i}" placeholder="Categoría obrero"/>
      <input type="number" min="0" value="${o.cant}" data-ob-cant="${i}" style="width:60px"/>
      <button class="btn-modal-remove" onclick="this.parentElement.remove()">✕</button>
    </div>`;
  });
  document.getElementById('modal-obrero').innerHTML=h;
}

function agregarObreroModal(){
  const ctn=document.getElementById('modal-obrero');
  const rows=ctn.querySelectorAll('.modal-row');
  const idx=rows.length;
  const div=document.createElement('div');
  div.className='modal-row';
  div.dataset.obIdx=idx;
  div.innerHTML=`<input type="text" value="" data-ob-name="${idx}" placeholder="Categoría obrero"/>
    <input type="number" min="0" value="0" data-ob-cant="${idx}" style="width:60px"/>
    <button class="btn-modal-remove" onclick="this.parentElement.remove()">✕</button>`;
  ctn.appendChild(div);
}

function renderEquiposModal(lista){
  let h='';
  lista.forEach((eq,i)=>{
    h+=`<div class="modal-row" data-eq-idx="${i}">
      <input type="text" value="${esc(eq.nombre)}" data-eq-name="${i}" placeholder="Nombre del equipo"/>
      <input type="number" min="0" value="${eq.cant}" data-eq-cant="${i}" style="width:60px"/>
      <button class="btn-modal-remove" onclick="eliminarEquipoModal(${i})">✕</button>
    </div>`;
  });
  document.getElementById('modal-equipos').innerHTML=h;
}

function agregarEquipoModal(){
  const ctn=document.getElementById('modal-equipos');
  const rows=ctn.querySelectorAll('.modal-row');
  const idx=rows.length;
  const div=document.createElement('div');
  div.className='modal-row';
  div.dataset.eqIdx=idx;
  div.innerHTML=`<input type="text" value="" data-eq-name="${idx}" placeholder="Nombre del equipo"/>
    <input type="number" min="0" value="0" data-eq-cant="${idx}" style="width:60px"/>
    <button class="btn-modal-remove" onclick="this.parentElement.remove()">✕</button>`;
  ctn.appendChild(div);
}

function eliminarEquipoModal(idx){
  const row=document.querySelector(`[data-eq-idx="${idx}"]`);
  if(row) row.remove();
}

function cerrarModal(){
  document.getElementById('modal-dia').classList.remove('active');
  modalFechaActual='';
}

async function guardarModal(){
  const fecha=modalFechaActual;
  if(!fecha) return;

  // Leer personal técnico
  const tecRows=document.querySelectorAll('#modal-tecnico .modal-row');
  const tecnico=[];
  tecRows.forEach(row=>{
    const nameInp=row.querySelector('input[type="text"]');
    const cantInp=row.querySelector('input[type="number"]');
    if(nameInp && cantInp){
      const rol=nameInp.value.trim();
      if(rol) tecnico.push({rol, cant: parseInt(cantInp.value)||0});
    }
  });

  // Leer personal obrero
  const obRows=document.querySelectorAll('#modal-obrero .modal-row');
  const obrero=[];
  obRows.forEach(row=>{
    const nameInp=row.querySelector('input[type="text"]');
    const cantInp=row.querySelector('input[type="number"]');
    if(nameInp && cantInp){
      const cat=nameInp.value.trim();
      if(cat) obrero.push({cat, cant: parseInt(cantInp.value)||0});
    }
  });

  personalData[fecha]={tecnico,obrero};

  // Leer equipos
  const eqRows=document.querySelectorAll('#modal-equipos .modal-row');

  eqRows.forEach(row=>{

      const nombre=nameInp.value.trim();
      if(nombre) equipos.push({nombre, cant: parseInt(cantInp.value)||0});
    }
  });
  equiposData[fecha]=equipos;

  // Cada día es independiente — NO se propagan cambios a días posteriores

  // Guardar en Firebase
  try{
    await Promise.all([
      fbSave('personal_data',personalData),
      fbSave('equipos_data',equiposData)
    ]);
  }catch(e){ console.warn('Error guardando modal:',e); }

  cerrarModal();
  cambiosPendientes=true;
  document.getElementById('btn-guardar').style.display='inline-block';
  renderDocumento();
}

const SECUENCIAS_ORDEN = {
  COLUMNAS:['HABILITADO','ARMADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  COLUMNETAS:['HABILITADO','ARMADO','ASENTADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  VIGAS:['HABILITADO','ARMADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  VIGUETAS:['HABILITADO','ARMADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  PLACAS:['HABILITADO','ARMADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  MUROS:['HABILITADO','ARMADO','ASENTADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  LOSAS_ALIGERADAS:['ENCOFRADO','LADRILLO','HABILITADO','ARMADO','VACIADO','DESENCOFRADO','CURADO'],
  LOSAS_MACIZAS:['ENCOFRADO','HABILITADO','ARMADO','VACIADO','DESENCOFRADO','CURADO'],
  ESCALERAS:['HABILITADO','ARMADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  ZAPATAS:['EXCAVAC','SOLADO','HABILITADO','ARMADO','VACIADO','CURADO','RELLENO'],
  CIMIENTOS:['EXCAVAC','HABILITADO','ARMADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  PARAPETOS:['HABILITADO','ARMADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  MESONES:['HABILITADO','ARMADO','ENCOFRADO','VACIADO','DESENCOFRADO','CURADO'],
  TARRAJEO:['TARRAJEO','CIELORRASO'],
};

function obtenerOrdenActividad(a){
  const cat = (a.partida.categoria || '').toUpperCase().replace(/ /g,'_');
  const desc = (a.descripcion || '').toUpperCase();
  const seq = SECUENCIAS_ORDEN[cat];
  if(!seq) return 999;
  for(let i=0;i<seq.length;i++){
    if(desc.includes(seq[i])) return i;
  }
  return 999;
}

function ordenarPorSecuencia(acts){
  return acts.slice().sort((a,b)=>{
    const oa = obtenerOrdenActividad(a);
    const ob = obtenerOrdenActividad(b);
    if(oa !== ob) return oa - ob;
    // Si mismo orden, ordenar por categoría y luego por descripción
    const catA = (a.partida.categoria||'').localeCompare(b.partida.categoria||'');
    if(catA !== 0) return catA;
    return (a.descripcion||'').localeCompare(b.descripcion||'');
  });
}

// ================================================================
// AGRUPAR ACTIVIDADES POR EJES (para cuaderno - fusionar mismo desc+elem+nivel+partida)
// ================================================================
function agruparActividadesPorEjes(acts){
  const grupos = [];
  const mapaGrupos = {};
  acts.forEach(a=>{
    const desc = (a.descripcion||'').toUpperCase().trim();
    const elem = (a.elemento||'').toUpperCase().trim();
    const nivel = (a.nivel||'').trim();
    const codigo = (a.partida.codigo||'').trim();
    const pct = a.pct != null ? Number(a.pct) : null;
    const key = `${desc}||${elem}||${nivel}||${codigo}||${pct}`;
    if(mapaGrupos[key] !== undefined){
      const grupo = grupos[mapaGrupos[key]];
      // Agregar ejes
      const ejesExistentes = grupo.ejes || '';
      const ejesNuevos = (a.ejes && a.ejes !== '—') ? a.ejes : '';
      if(ejesNuevos && ejesExistentes){
        grupo.ejes = ejesExistentes + ', ' + ejesNuevos;
      } else if(ejesNuevos){
        grupo.ejes = ejesNuevos;
      }
      grupo._ids.push(a.id);
    } else {
      const copia = Object.assign({}, a);
      copia._ids = [a.id];
      mapaGrupos[key] = grupos.length;
      grupos.push(copia);
    }
  });
  return grupos;
}

// ================================================================
// GENERAR PÁRRAFO NARRATIVO de una actividad
// ================================================================
function generarParrafo(a){
  const desc = a.descripcion || '';
  const elem = (a.elemento && a.elemento !== '—') ? a.elemento : '';
  const nivel = (a.nivel && a.nivel !== '—') ? a.nivel : '';
  const ejes = (a.ejes && a.ejes !== '—') ? a.ejes : '';
  const codigo = a.partida.codigo || '';
  const partida = a.partida.nombre || '';
  const pct = a.pct != null ? Number(a.pct) : null;

  let verbo = 'Se programó';
  if(pct !== null){
    if(pct >= 100) verbo = 'Se realizó';
    else if(pct > 0) verbo = 'Se inició';
  }

  const descFmt = desc.charAt(0).toUpperCase() + desc.slice(1).toLowerCase();
  let txt = verbo + ' el ' + descFmt;
  if(elem) txt += ' de las ' + elem;
  if(nivel) txt += ' en el ' + nivel;
  if(ejes) txt += ' en los ejes ' + ejes;
  txt += ', correspondiente a la partida ' + codigo + ' ' + partida;
  if(pct !== null && pct < 100 && pct > 0) txt += ' (avance: ' + pct + '%)';
  txt += '.';
  return txt;
}

          new TableCell({width:{size:50,type:WidthType.PERCENTAGE},borders:na,children:[new Paragraph({indent:{left:convertInchesToTwip(0.15)},children:[new TextRun({text:rTxt,size:19,font:"Calibri"})]})]})
        ]}));
      }
      ch.push(new Table({width:{size:95,type:WidthType.PERCENTAGE},indent:{size:convertInchesToTwip(0.2),type:WidthType.DXA},borders:{top:nb,bottom:nb,left:nb,right:nb,insideHorizontal:nb,insideVertical:nb},rows:eRows}));
    } else {
      ch.push(new Paragraph({spacing:{after:40},indent:{left:convertInchesToTwip(0.3)},children:[new TextRun({text:"Sin datos registrados.",size:18,italics:true,color:"999999",font:"Calibri"})]}));
    }

    // ── IV. OBSERVACIONES ──
    ch.push(new Paragraph({spacing:{before:120,after:60},children:[new TextRun({text:"IV. OBSERVACIONES",bold:true,size:22,color:"0D47A1",font:"Calibri",underline:{}})]}));
    if(obsDia){
      obsDia.split('\n').forEach(linea=>{
        ch.push(new Paragraph({spacing:{after:60},indent:{left:convertInchesToTwip(0.3)},children:[new TextRun({text:linea,size:20,font:"Calibri"})]}));
      });
    } else {
      ch.push(new Paragraph({spacing:{after:40},indent:{left:convertInchesToTwip(0.3)},children:[new TextRun({text:"Sin observaciones.",size:18,italics:true,color:"999999",font:"Calibri"})]}));
    }


    sections.push({
      properties:{
        page:{
          size:{orientation:PageOrientation.PORTRAIT},
          margin:{top:convertInchesToTwip(0.8),bottom:convertInchesToTwip(0.8),left:convertInchesToTwip(1),right:convertInchesToTwip(1)}
        }
      },
      children:ch
    });
  }

  const doc=new Document({sections});
  const blob=await Packer.toBlob(doc);
  saveAs(blob,`Cuaderno_Obra_${desde}_al_${hasta}.docx`);
}

// ================================================================
// EDICIÓN DE PÁRRAFOS
// ================================================================
document.addEventListener('input', (e) => {
  const el = e.target;

  // Edición de párrafos de actividades
  if (el.classList.contains('parrafo-act') && el.dataset.actId) {
    const id = el.dataset.actId;
    const textoActual = el.innerText.trim();
    const textoAuto = el.dataset.auto;
    if (textoActual !== textoAuto) {
      parrafosEditados[id] = textoActual;
      el.classList.add('editado');
    } else {
      delete parrafosEditados[id];
      el.classList.remove('editado');
    }
    cambiosPendientes = true;
    document.getElementById('btn-guardar').style.display = 'inline-block';
  }

  // Edición de observaciones
  if (el.classList.contains('observaciones-text') && el.dataset.obsFecha) {
    const fecha = el.dataset.obsFecha;
    const texto = el.innerText.trim();
    if(texto) observacionesData[fecha] = texto;
    else delete observacionesData[fecha];
    cambiosPendientes = true;
    document.getElementById('btn-guardar').style.display = 'inline-block';
  }
});

// Guardar ediciones en Firebase
document.getElementById('btn-guardar').addEventListener('click', async () => {
  const btn = document.getElementById('btn-guardar');
  btn.textContent = '⏳ Guardando...';
  btn.disabled = true;
  try {
    await Promise.all([
      fbSave('parrafos_editados', parrafosEditados),
      fbSave('observaciones_data', observacionesData),
      fbSave('personal_data', personalData),
      fbSave('equipos_data', equiposData)
    ]);
    cambiosPendientes = false;
    btn.textContent = '✅ ¡Guardado!';
    setTimeout(() => { btn.disabled = false; btn.textContent = '💾 Guardar ediciones'; btn.style.display = 'none'; }, 2000);
    renderDocumento();
  } catch(e) {
    alert('Error guardando: ' + e.message);
    btn.textContent = '💾 Guardar ediciones';
    btn.disabled = false;
  }
});

// Reset un párrafo al texto automático
function resetParrafo(btnEl) {
  const parrafoEl = btnEl.closest('.parrafo-act');
  if (!parrafoEl) return;
  const id = parrafoEl.dataset.actId;
  const textoAuto = parrafoEl.dataset.auto;
  delete parrafosEditados[id];
  cambiosPendientes = true;
  document.getElementById('btn-guardar').style.display = 'inline-block';
  parrafoEl.innerText = textoAuto;
  parrafoEl.classList.remove('editado');
}

// Advertir al salir con cambios pendientes
window.addEventListener('beforeunload', (e) => {
  if (cambiosPendientes) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ================================================================
// INIT
// ================================================================
(async function(){
  try{
    const [fb, pe, pd, ed, od] = await Promise.all([
      fbLoad('actividades',null),
      fbLoad('parrafos_editados',null),
      fbLoad('personal_data',null),
      fbLoad('equipos_data',null),
      fbLoad('observaciones_data',null)
    ]);

    if(fb&&Array.isArray(fb)) actividades=fb.filter(a=>a!=null);
    if(pe && typeof pe === 'object') parrafosEditados = pe;
    if(pd && typeof pd === 'object') personalData = pd;
    if(ed && typeof ed === 'object') equiposData = ed;
    if(od && typeof od === 'object') observacionesData = od;

    document.getElementById('fb-status').textContent='🟢 '+actividades.length+' act.';

    const fechas=actividades.map(a=>a.fecha).filter(Boolean).sort();
    document.getElementById('rep-desde').value=fechas[0]||'';
    document.getElementById('rep-hasta').value=fechas[fechas.length-1]||'';

    document.getElementById('loading').style.display='none';
    renderDocumento();
  }catch(e){
    console.warn(e);
    document.getElementById('fb-status').textContent='🔴 Error';
    document.getElementById('loading').innerHTML='<p style="color:#c62828">❌ Error al conectar</p>';
  }
})();

['rep-desde','rep-hasta'].forEach(id=>{document.getElementById(id).addEventListener('change',renderDocumento);});
document.getElementById('rep-residente').addEventListener('input',renderDocumento);
document.getElementById('rep-inspector').addEventListener('input',renderDocumento);
</script>
