  const fbDB = firebase.database();
  const FB_ROOT = 'obra_data';
  function fbLoad(key, defVal) {
    return fbDB.ref(FB_ROOT + '/' + key).once('value').then(snap => {
      const v = snap.val(); return v != null ? v : defVal;
    }).catch(() => defVal);
  }
  function fbSave(key, data) {
    try { fbDB.ref(FB_ROOT + '/' + key).set(data); } catch(e) { console.warn('Firebase save error:', e); }
  }

<script>
const MESES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
const DIAS_SEM=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
function fmtFecha(fs){
  const d=new Date(fs+'T00:00:00');
  return `${DIAS_SEM[d.getDay()].charAt(0).toUpperCase()+DIAS_SEM[d.getDay()].slice(1)} ${String(d.getDate()).padStart(2,'0')} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}
function esc(t){return(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let actividades=[];
let parrafosEditados={}; // { actividadId: "texto editado" }
let cambiosPendientes=false;

// ================================================================
// GENERAR PÁRRAFO NARRATIVO de una actividad
// ================================================================
function generarParrafo(a){
  const desc = a.descripcion || '';
  const elem = (a.elemento && a.elemento !== '—') ? a.elemento : '';
  const nivel = (a.nivel && a.nivel !== '—') ? a.nivel : '';
  const ejes = (a.ejes && a.ejes !== '—') ? a.ejes : '';
  const codigo = a.partida.codigo || '';
  const partida = a.partida.nombre || '';
  const pct = a.pct != null ? Number(a.pct) : null;

  // Determinar verbo según porcentaje
  let verbo = 'Se programó';
  if(pct !== null){
    if(pct >= 100) verbo = 'Se realizó';
    else if(pct > 0) verbo = 'Se inició';
  }

  // Construir oración
  let txt = verbo + ' ' + desc.charAt(0).toLowerCase() + desc.slice(1);

  // Agregar elemento si existe
  if(elem) txt += ' del ' + elem;

  // Agregar nivel
  if(nivel) txt += ' en el ' + nivel;

  // Agregar ejes
  if(ejes) txt += ' en los ejes ' + ejes;

  // Agregar partida
  txt += ', correspondiente a la partida ' + codigo + ' ' + partida;

  // Agregar porcentaje si no es 100%
  if(pct !== null && pct < 100 && pct > 0) txt += ' (avance: ' + pct + '%)';

  txt += '.';
  return txt;
}

// ================================================================
// RENDERIZAR VISTA PREVIA
// ================================================================
function renderDocumento(){
  const desde=document.getElementById('rep-desde').value;
  const hasta=document.getElementById('rep-hasta').value;
  const residente=document.getElementById('rep-residente').value.trim()||'Residente de Obra';
  const inspector=document.getElementById('rep-inspector').value.trim()||'Inspector / Supervisor';
  const ctn=document.getElementById('pages-container');

  if(!desde||!hasta){
    ctn.innerHTML='<div class="word-page"><div class="empty-msg">📅 Selecciona las fechas <b>Desde</b> y <b>Hasta</b> en la barra superior.</div></div>';
    ctn.style.display='flex'; document.getElementById('btn-descargar').disabled=true; return;
  }

  const desdeD=new Date(desde+'T00:00:00'), hastaD=new Date(hasta+'T00:00:00');
  let acts=actividades.filter(a=>{const fa=new Date(a.fecha+'T00:00:00');return fa>=desdeD&&fa<=hastaD;});

  if(!acts.length){
    ctn.innerHTML='<div class="word-page"><div class="empty-msg">📭 No hay actividades en el rango seleccionado.</div></div>';
    ctn.style.display='flex'; document.getElementById('btn-descargar').disabled=true; return;
  }

  document.getElementById('btn-descargar').disabled=false;

  // Agrupar por fecha
  const porFecha={};
  acts.forEach(a=>{porFecha[a.fecha]=porFecha[a.fecha]||[];porFecha[a.fecha].push(a);});

  let h='';

  // Una "hoja" por día (puede crecer según contenido)
  for(const fecha of Object.keys(porFecha).sort()){
    const actsDia=porFecha[fecha];
    h+='<div class="word-page">';

    // Encabezado del documento en cada página
    h+='<div class="doc-title">CUADERNO DE OBRA</div>';
    h+='<div class="doc-sub">MEJORAMIENTO Y AMPLIACIÓN DE LOS SERVICIOS OPERATIVOS</div>';
    h+='<div class="doc-sub2">LABORATORIO AMBIENTAL SAN AGUSTÍN DE TORATA - PROVINCIA MARISCAL NIETO - MOQUEGUA</div>';

    h+=`<table class="info-table"><tr>
      <td class="lbl">Residente:</td><td>${esc(residente)}</td>
      <td class="lbl">Inspector:</td><td>${esc(inspector)}</td>
    </tr><tr>
      <td class="lbl">Fecha:</td><td colspan="3">${fmtFecha(fecha)}</td>
    </tr></table>`;

    // Día
    h+='<div class="dia-section">';
    h+=`<div class="dia-titulo">${fmtFecha(fecha).toUpperCase()}</div>`;
    h+='<div class="subtitulo-actividades">ACTIVIDADES</div>';

    actsDia.forEach(a=>{
      const textoAuto = generarParrafo(a);
      const textoEditado = parrafosEditados[a.id];
      const textoMostrar = textoEditado || textoAuto;
      const esEditado = !!textoEditado;
      const clsEdit = esEditado ? ' editado' : '';
      const badge = esEditado
        ? '<span class="edit-indicator edited">✏ editado</span>'
        : '<span class="edit-indicator auto">⚡ auto</span>';
      h+=`<div class="parrafo-act${clsEdit}" contenteditable="true" data-act-id="${a.id}" data-auto="${esc(textoAuto)}">${esc(textoMostrar)}${esEditado ? '<button class="btn-reset" title="Volver al texto automático" onclick="resetParrafo(this)">✕ reset</button>' : ''}</div>${badge}`;
    });

    h+='</div>'; // dia-section

    // Firmas al final de cada día
    h+=`<div class="firmas" style="margin-top:auto; padding-top:40px;">
      <div class="firma-box"><div class="firma-linea"></div><div class="firma-nombre">${esc(residente)}</div><div class="firma-cargo">Residente de Obra</div></div>
      <div class="firma-box"><div class="firma-linea"></div><div class="firma-nombre">${esc(inspector)}</div><div class="firma-cargo">Inspector / Supervisor</div></div>
    </div>`;

    h+='</div>'; // word-page
  }

  ctn.innerHTML=h;
  ctn.style.display='flex';
}

// ================================================================
// DESCARGAR .DOCX
// ================================================================
document.getElementById('btn-descargar').addEventListener('click',async()=>{
  const desde=document.getElementById('rep-desde').value,hasta=document.getElementById('rep-hasta').value;
  const residente=document.getElementById('rep-residente').value.trim()||'Residente de Obra';
  const inspector=document.getElementById('rep-inspector').value.trim()||'Inspector / Supervisor';
  if(!desde||!hasta)return;
  const desdeD=new Date(desde+'T00:00:00'),hastaD=new Date(hasta+'T00:00:00');
  let ar=actividades.filter(a=>{const fa=new Date(a.fecha+'T00:00:00');return fa>=desdeD&&fa<=hastaD;});
  if(!ar.length)return;
  const btn=document.getElementById('btn-descargar');
  btn.textContent='⏳ Generando...';btn.disabled=true;
  try{await generarCuadernoWord(desde,hasta,residente,inspector,ar);btn.textContent='✅ ¡Descargado!';}
  catch(e){console.error(e);alert('Error: '+e.message);btn.textContent='⬇ Descargar .docx';}
  setTimeout(()=>{btn.disabled=false;btn.textContent='⬇ Descargar .docx';},3000);
});

// ================================================================
// GENERADOR WORD — Cuaderno de Obra con párrafos
// ================================================================
async function generarCuadernoWord(desde,hasta,residente,inspector,actsRango){
  const{Document,Packer,Paragraph,TextRun,Table,TableRow,TableCell,WidthType,AlignmentType,BorderStyle,ShadingType,PageOrientation,VerticalAlign,convertInchesToTwip}=docx;
  const BT={style:BorderStyle.SINGLE,size:1,color:"BBBBBB"};
  const CB={top:BT,bottom:BT,left:BT,right:BT};
  const dC=(t,w,o={})=>new TableCell({width:{size:w,type:WidthType.PERCENTAGE},shading:o.bg?{type:ShadingType.SOLID,color:o.bg}:undefined,borders:CB,verticalAlign:VerticalAlign.CENTER,children:[new Paragraph({alignment:o.center?AlignmentType.CENTER:AlignmentType.LEFT,children:[new TextRun({text:t||'',size:o.size||20,bold:o.bold||false,font:"Calibri",color:o.color||"222222"})]})]});
  const nb={style:BorderStyle.NONE},na={top:nb,bottom:nb,left:nb,right:nb};

  const porFecha={};
  actsRango.forEach(a=>{porFecha[a.fecha]=porFecha[a.fecha]||[];porFecha[a.fecha].push(a);});

  const sections=[];

  for(const fecha of Object.keys(porFecha).sort()){
    const actsDia=porFecha[fecha];
    const ch=[];

    // Título
    ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:60},children:[new TextRun({text:"CUADERNO DE OBRA",bold:true,size:32,color:"0D47A1",font:"Calibri"})]}));
    ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:30},children:[new TextRun({text:"MEJORAMIENTO Y AMPLIACIÓN DE LOS SERVICIOS OPERATIVOS",size:18,color:"555555",font:"Calibri"})]}));
    ch.push(new Paragraph({alignment:AlignmentType.CENTER,spacing:{after:160},children:[new TextRun({text:"LABORATORIO AMBIENTAL SAN AGUSTÍN DE TORATA - PROVINCIA MARISCAL NIETO - MOQUEGUA",size:18,color:"555555",font:"Calibri"})]}));

    // Datos
    ch.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[
      new TableRow({children:[dC("Residente:",22,{bold:true,bg:"F0F4FF"}),dC(residente,28),dC("Inspector:",22,{bold:true,bg:"F0F4FF"}),dC(inspector,28)]}),
      new TableRow({children:[dC("Fecha:",22,{bold:true,bg:"F0F4FF"}),new TableCell({width:{size:78,type:WidthType.PERCENTAGE},columnSpan:3,borders:CB,children:[new Paragraph({children:[new TextRun({text:fmtFecha(fecha),size:20,font:"Calibri"})]})]})]}),
    ]}));
    ch.push(new Paragraph({spacing:{after:200},children:[]}));

    // Encabezado del día
    ch.push(new Paragraph({spacing:{before:100,after:80},shading:{type:ShadingType.SOLID,color:"0D47A1"},children:[new TextRun({text:`  ${fmtFecha(fecha).toUpperCase()}  `,bold:true,size:22,color:"FFFFFF",font:"Calibri"})]}));

    // Subtítulo ACTIVIDADES
    ch.push(new Paragraph({spacing:{after:80},children:[new TextRun({text:"ACTIVIDADES",bold:true,size:22,color:"0D47A1",font:"Calibri",underline:{}})]}));

    // Párrafos narrativos (usa editados si existen)
    actsDia.forEach(a=>{
      const txt = parrafosEditados[a.id] || generarParrafo(a);
      ch.push(new Paragraph({
        spacing:{after:100},
        bullet:{level:0},
        children:[new TextRun({text:txt,size:20,font:"Calibri"})]
      }));
    });

    // Espacio y firmas
    ch.push(new Paragraph({spacing:{before:400},children:[]}));
    ch.push(new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[new TableRow({children:[
      new TableCell({width:{size:50,type:WidthType.PERCENTAGE},borders:na,children:[
        new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"_".repeat(35),size:20,font:"Calibri"})]}),
        new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:residente,bold:true,size:20,font:"Calibri"})]}),
        new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"Residente de Obra",size:18,font:"Calibri"})]})
      ]}),
      new TableCell({width:{size:50,type:WidthType.PERCENTAGE},borders:na,children:[
        new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"_".repeat(35),size:20,font:"Calibri"})]}),
        new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:inspector,bold:true,size:20,font:"Calibri"})]}),
        new Paragraph({alignment:AlignmentType.CENTER,children:[new TextRun({text:"Inspector / Supervisor",size:18,font:"Calibri"})]})
      ]})
    ]})]}));

    sections.push({
      properties:{
        page:{
          size:{orientation:PageOrientation.PORTRAIT},
          margin:{top:convertInchesToTwip(0.8),bottom:convertInchesToTwip(0.8),left:convertInchesToTwip(1),right:convertInchesToTwip(1)}
        }
      },
      children:ch
    });
  }

  const doc=new Document({sections});
  const blob=await Packer.toBlob(doc);
  saveAs(blob,`Cuaderno_Obra_${desde}_al_${hasta}.docx`);
}

// ================================================================
// EDICIÓN DE PÁRRAFOS
// ================================================================

// Detectar cambios en párrafos editables
document.addEventListener('input', (e) => {
  const el = e.target;
  if (!el.classList.contains('parrafo-act') || !el.dataset.actId) return;
  const id = el.dataset.actId;
  const textoActual = el.innerText.trim();
  const textoAuto = el.dataset.auto;

  if (textoActual !== textoAuto) {
    parrafosEditados[id] = textoActual;
    el.classList.add('editado');
  } else {
    delete parrafosEditados[id];
    el.classList.remove('editado');
  }
  cambiosPendientes = true;
  document.getElementById('btn-guardar').classList.add('visible');
});

// Guardar ediciones en Firebase
document.getElementById('btn-guardar').addEventListener('click', async () => {
  const btn = document.getElementById('btn-guardar');
  btn.textContent = '⏳ Guardando...';
  btn.disabled = true;
  try {
    await fbSave('parrafos_editados', parrafosEditados);
    cambiosPendientes = false;
    btn.textContent = '✅ ¡Guardado!';
    btn.classList.remove('visible');
    setTimeout(() => { btn.disabled = false; btn.textContent = '💾 Guardar ediciones'; }, 2000);
    renderDocumento(); // re-render para actualizar badges
  } catch(e) {
    alert('Error guardando: ' + e.message);
    btn.textContent = '💾 Guardar ediciones';
    btn.disabled = false;
  }
});

// Reset un párrafo al texto automático
function resetParrafo(btnEl) {
  const parrafoEl = btnEl.closest('.parrafo-act');
  if (!parrafoEl) return;
  const id = parrafoEl.dataset.actId;
  const textoAuto = parrafoEl.dataset.auto;
  delete parrafosEditados[id];
  cambiosPendientes = true;
  document.getElementById('btn-guardar').classList.add('visible');
  parrafoEl.innerText = textoAuto;
  parrafoEl.classList.remove('editado');
}

// Advertir al salir con cambios pendientes
window.addEventListener('beforeunload', (e) => {
  if (cambiosPendientes) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ================================================================
// INIT
// ================================================================
(async function(){
  try{
    const fb=await fbLoad('actividades',null);
    if(fb&&Array.isArray(fb)) actividades=fb.filter(a=>a!=null);

    // Cargar párrafos editados
    const pe=await fbLoad('parrafos_editados',null);
    if(pe && typeof pe === 'object') parrafosEditados = pe;

    document.getElementById('fb-status').textContent='🟢 '+actividades.length+' act.';

    // Rango completo
    const fechas=actividades.map(a=>a.fecha).filter(Boolean).sort();
    document.getElementById('rep-desde').value=fechas[0]||'';
    document.getElementById('rep-hasta').value=fechas[fechas.length-1]||'';

    document.getElementById('loading').style.display='none';
    renderDocumento();
  }catch(e){
    console.warn(e);
    document.getElementById('fb-status').textContent='🔴 Error';
    document.getElementById('loading').innerHTML='<p style="color:#c62828">❌ Error al conectar</p>';
  }
})();

['rep-desde','rep-hasta'].forEach(id=>{document.getElementById(id).addEventListener('change',renderDocumento);});
document.getElementById('rep-residente').addEventListener('input',renderDocumento);
document.getElementById('rep-inspector').addEventListener('input',renderDocumento);
</script>
</body>
</html>
