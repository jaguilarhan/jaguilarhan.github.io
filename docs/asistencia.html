<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Asistencia de Personal</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC20KbwElcjYmTauZXKha5k6h1_wHwQr24",
    authDomain: "proyect3082.firebaseapp.com",
    databaseURL: "https://proyect3082-default-rtdb.firebaseio.com",
    projectId: "proyect3082",
    storageBucket: "proyect3082.firebasestorage.app",
    messagingSenderId: "788964461190",
    appId: "1:788964461190:web:cc40ec843d14f6f6769f07"
  };
  firebase.initializeApp(firebaseConfig);
  const fbDB = firebase.database();
  const FB_ROOT = 'obra_data';

  function fbLoad(key, defVal) {
    return fbDB.ref(FB_ROOT + '/' + key).once('value').then(snap => {
      const value = snap.val();
      return value != null ? value : defVal;
    }).catch(() => defVal);
  }

  function fbSave(key, data) {
    return fbDB.ref(FB_ROOT + '/' + key).set(data);
  }
</script>
<script src="asistencia_data.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f2f4f8;
    color: #1f2937;
  }
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: linear-gradient(135deg, #1a237e, #283593);
    color: #fff;
    padding: 10px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .toolbar h1 {
    margin: 0;
    font-size: 1rem;
    margin-right: auto;
  }
  .toolbar input[type="date"],
  .toolbar input[type="text"],
  .toolbar button,
  .toolbar a {
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 16px;
    padding: 6px 10px;
    font-size: .78rem;
    background: rgba(255,255,255,.14);
    color: #fff;
    text-decoration: none;
    font-family: inherit;
  }
  .toolbar input::placeholder { color: rgba(255,255,255,.85); }
  .toolbar .btn-main {
    background: #2e7d32;
    border-color: #2e7d32;
    cursor: pointer;
    font-weight: 700;
  }
  .toolbar .btn-main:hover { background: #1b5e20; }
  .toolbar .btn-aux { cursor: pointer; }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .container { max-width: 1300px; margin: 14px auto; padding: 0 10px 24px; }
  .resumen {
    background: #fff;
    border: 1px solid #e3e8ef;
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    font-size: .85rem;
  }
  .pill {
    border-radius: 14px;
    padding: 4px 10px;
    font-weight: 700;
  }
  .pill.p { background: #e8f5e9; color: #2e7d32; }
  .pill.f { background: #ffebee; color: #c62828; }
  .pill.cp { background: #fff3e0; color: #e65100; }
  .pill.sr { background: #eceff1; color: #455a64; }

  .table-wrap {
    background: #fff;
    border: 1px solid #e3e8ef;
    border-radius: 10px;
    overflow: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 980px;
  }
  th, td {
    padding: 8px 9px;
    border-bottom: 1px solid #edf1f5;
    font-size: .8rem;
    text-align: left;
    vertical-align: middle;
  }
  thead th {
    position: sticky;
    top: 0;
    background: #eef2ff;
    color: #1a237e;
    z-index: 5;
  }
  tbody tr:hover { background: #fafcff; }
  .col-center { text-align: center; }
  .estado {
    width: 70px;
    padding: 4px 6px;
    border: 1px solid #bfc7d2;
    border-radius: 6px;
    font-size: .78rem;
    font-family: inherit;
  }
  .estado.p { border-color: #66bb6a; background: #e8f5e9; color: #2e7d32; }
  .estado.f { border-color: #ef9a9a; background: #ffebee; color: #c62828; }
  .estado.cp { border-color: #ffcc80; background: #fff3e0; color: #e65100; }
  #status {
    font-size: .72rem;
    opacity: .9;
  }
</style>
</head>
<body>
<div class="toolbar">
  <h1>Asistencia de Personal</h1>
  <span id="status">Cargando...</span>
  <label class="sr-only" for="asistencia-fecha">Fecha</label>
  <input type="date" id="asistencia-fecha"/>
  <label class="sr-only" for="filtro">Filtro por nombre o DNI</label>
  <input type="text" id="filtro" placeholder="Buscar DNI o nombre"/>
  <button class="btn-aux" id="btn-p">Marcar todos P</button>
  <button class="btn-aux" id="btn-f">Marcar todos F</button>
  <button class="btn-aux" id="btn-limpiar">Limpiar</button>
  <button class="btn-main" id="btn-guardar">Guardar</button>
  <a href="index.html">Volver</a>
</div>

<div class="container">
  <div class="resumen" id="resumen"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-center">N</th>
          <th>DNI N</th>
          <th>APELLIDO PATERNO</th>
          <th>APELLIDO MATERNO</th>
          <th>NOMBRES</th>
          <th>CATEGORIA</th>
          <th>OCUPACION</th>
          <th>FECHA DE INGRESO</th>
          <th class="col-center">ASISTENCIA</th>
        </tr>
      </thead>
      <tbody id="tabla-body"></tbody>
    </table>
  </div>
</div>

<script>
const PERSONAL = Array.isArray(window.PERSONAL_ASISTENCIA) ? window.PERSONAL_ASISTENCIA : [];
const ESTADOS = ['', 'P', 'F', 'CP'];
let asistenciaData = {};
let cambiosPendientes = false;

function getFechaActual() {
  return document.getElementById('asistencia-fecha').value;
}

function getAsistenciaDia(fecha) {
  if (!fecha) return {};
  if (!asistenciaData[fecha] || typeof asistenciaData[fecha] !== 'object') {
    asistenciaData[fecha] = {};
  }
  return asistenciaData[fecha];
}

function applyEstadoClass(selectEl, estado) {
  selectEl.classList.remove('p', 'f', 'cp');
  if (estado === 'P') selectEl.classList.add('p');
  if (estado === 'F') selectEl.classList.add('f');
  if (estado === 'CP') selectEl.classList.add('cp');
}

function setStatus(texto) {
  document.getElementById('status').textContent = texto;
}

function renderResumen(filasVisibles, mapaDia) {
  let p = 0;
  let f = 0;
  let cp = 0;
  let sr = 0;

  filasVisibles.forEach(persona => {
    const estado = mapaDia[persona.id] || '';
    if (estado === 'P') p += 1;
    else if (estado === 'F') f += 1;
    else if (estado === 'CP') cp += 1;
    else sr += 1;
  });

  document.getElementById('resumen').innerHTML =
    '<span class="pill p">P: ' + p + '</span>' +
    '<span class="pill f">F: ' + f + '</span>' +
    '<span class="pill cp">CP: ' + cp + '</span>' +
    '<span class="pill sr">Sin registro: ' + sr + '</span>' +
    '<span>Total: ' + filasVisibles.length + ' personas</span>';
}

function renderTabla() {
  const fecha = getFechaActual();
  const filtro = (document.getElementById('filtro').value || '').trim().toUpperCase();
  const mapaDia = getAsistenciaDia(fecha);
  const body = document.getElementById('tabla-body');

  const filas = PERSONAL.filter(persona => {
    if (!filtro) return true;
    const texto = [
      persona.dni,
      persona.apellidoPaterno,
      persona.apellidoMaterno,
      persona.nombres,
      persona.nombreCompleto,
      persona.ocupacion,
      persona.categoria
    ].join(' ').toUpperCase();
    return texto.indexOf(filtro) !== -1;
  });

  let html = '';
  filas.forEach(persona => {
    const estado = mapaDia[persona.id] || '';
    html += '<tr>' +
      '<td class="col-center">' + (persona.n || '') + '</td>' +
      '<td>' + (persona.dni || '') + '</td>' +
      '<td>' + (persona.apellidoPaterno || '') + '</td>' +
      '<td>' + (persona.apellidoMaterno || '') + '</td>' +
      '<td>' + (persona.nombres || '') + '</td>' +
      '<td>' + (persona.categoria || '') + '</td>' +
      '<td>' + (persona.ocupacion || '') + '</td>' +
      '<td>' + (persona.fechaIngreso || '') + '</td>' +
      '<td class="col-center">' +
        '<select class="estado" data-id="' + persona.id + '">' +
          ESTADOS.map(st => '<option value="' + st + '"' + (st === estado ? ' selected' : '') + '>' + (st || '--') + '</option>').join('') +
        '</select>' +
      '</td>' +
      '</tr>';
  });

  body.innerHTML = html;
  body.querySelectorAll('select.estado').forEach(select => {
    applyEstadoClass(select, select.value);
    select.addEventListener('change', () => {
      const id = select.getAttribute('data-id');
      const valor = select.value;
      const dia = getAsistenciaDia(getFechaActual());

      if (valor) dia[id] = valor;
      else delete dia[id];

      applyEstadoClass(select, valor);
      cambiosPendientes = true;
      setStatus('Cambios pendientes');
      renderResumen(filas, dia);
    });
  });

  renderResumen(filas, mapaDia);
}

function marcarVisibles(estado) {
  const fecha = getFechaActual();
  const dia = getAsistenciaDia(fecha);
  document.querySelectorAll('#tabla-body select.estado').forEach(select => {
    const id = select.getAttribute('data-id');
    select.value = estado;
    if (estado) dia[id] = estado;
    else delete dia[id];
    applyEstadoClass(select, estado);
  });
  cambiosPendientes = true;
  setStatus('Cambios pendientes');
  renderTabla();
}

async function guardarAsistencia() {
  const btn = document.getElementById('btn-guardar');
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  try {
    await fbSave('asistencia_data', asistenciaData);
    cambiosPendientes = false;
    setStatus('Guardado en Firebase');
    btn.textContent = 'Guardado';
  } catch (e) {
    console.warn(e);
    setStatus('Error al guardar');
    btn.textContent = 'Guardar';
  }
  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }, 1200);
}

(async function init() {
  const fechaInp = document.getElementById('asistencia-fecha');
  fechaInp.valueAsDate = new Date();

  const data = await fbLoad('asistencia_data', {});
  asistenciaData = (data && typeof data === 'object') ? data : {};

  setStatus('Listo: ' + PERSONAL.length + ' personas');
  renderTabla();

  fechaInp.addEventListener('change', renderTabla);
  document.getElementById('filtro').addEventListener('input', renderTabla);
  document.getElementById('btn-p').addEventListener('click', () => marcarVisibles('P'));
  document.getElementById('btn-f').addEventListener('click', () => marcarVisibles('F'));
  document.getElementById('btn-limpiar').addEventListener('click', () => marcarVisibles(''));
  document.getElementById('btn-guardar').addEventListener('click', guardarAsistencia);
})();

window.addEventListener('beforeunload', (e) => {
  if (cambiosPendientes) {
    e.preventDefault();
    e.returnValue = '';
  }
});
</script>
</body>
</html>
