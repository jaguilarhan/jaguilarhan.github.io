    appId: "1:788964461190:web:cc40ec843d14f6f6769f07"
  };
  firebase.initializeApp(firebaseConfig);
  const fbDB = firebase.database();
  const FB_ROOT = 'obra_data';
  function fbSave(key, data) {
    try { fbDB.ref(FB_ROOT + '/' + key).set(data); } catch(e) { console.warn('Firebase save error:', e); }
  }
  function fbLoad(key, defVal) {
    return fbDB.ref(FB_ROOT + '/' + key).once('value').then(snap => {
      const v = snap.val(); return v != null ? v : defVal;
    }).catch(() => defVal);
  }

<script>
// ================================================================
// VARIABLES GLOBALES
// ================================================================
const MESES_NOMBRES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let mesActual = '';
let partidasSeleccionadas = new Set();
let avanceData = {}; // { partidaId: { filas: [...] } }
let acumuladoData = {}; // { partidaId: totalAcumAnterior }

// ================================================================
// INIT
// ================================================================
window.addEventListener('DOMContentLoaded', () => {
  initMeses();
  renderSidebar();
  initModal();
});

function initMeses() {
  const sel = document.getElementById('sel-mes');
  const hoy = new Date();
  for (let y = 2026; y <= 2027; y++) {
    for (let m = 0; m < 12; m++) {
      const val = y + '-' + String(m+1).padStart(2,'0');
      const opt = document.createElement('option');
      opt.value = val;
      opt.textContent = MESES_NOMBRES[m] + ' ' + y;
      if (y === hoy.getFullYear() && m === hoy.getMonth()) opt.selected = true;
      sel.appendChild(opt);
    }
  }
  mesActual = sel.value;
  sel.addEventListener('change', () => {
    mesActual = sel.value;
    // Recargar datos de todas las seleccionadas
    partidasSeleccionadas.forEach(id => cargarAvancePartida(id));
  });
}

function renderSidebar() {
  const container = document.getElementById('sidebar-list');
  container.innerHTML = '';
  document.getElementById('stat-total').textContent = METRADOS_PARTIDAS.length;

  METRADOS_PARTIDAS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'partida-item';
    div.dataset.id = p.id;

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.dataset.id = p.id;

    const info = document.createElement('div');
    info.className = 'partida-info';
    info.innerHTML = `
      <div class="partida-num">${p.numero}</div>
      <div class="partida-desc">${p.descripcion}</div>
      <div class="partida-met">${p.metrado_total} ${p.unidad} · ${p.tipo === 'acero' ? '🔩 Acero' : '📦 Volumétrico'}</div>
    `;

    const icon = document.createElement('span');
    icon.className = 'partida-check-icon';
    icon.id = 'icon-' + p.id;

    div.appendChild(cb);
    div.appendChild(info);
    div.appendChild(icon);

    // Click en el item (no en el checkbox) también marca
    div.addEventListener('click', (e) => {
      if (e.target !== cb) cb.checked = !cb.checked;
      togglePartida(p.id, cb.checked);
    });

    cb.addEventListener('change', () => togglePartida(p.id, cb.checked));

    container.appendChild(div);
  });

  // Búsqueda
  document.getElementById('search-partida').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    container.querySelectorAll('.partida-item').forEach(div => {
      const p = METRADOS_PARTIDAS.find(x => x.id === div.dataset.id);
      const text = (p.numero + ' ' + p.descripcion).toLowerCase();
      div.style.display = text.includes(q) ? '' : 'none';
    });
  });
}

async function togglePartida(id, checked) {
  const div = document.querySelector(`.partida-item[data-id="${id}"]`);
  if (checked) {
    partidasSeleccionadas.add(id);
    div.classList.add('selected');
    await cargarAvancePartida(id);
  } else {
    partidasSeleccionadas.delete(id);
    div.classList.remove('selected');
    delete avanceData[id];
  }
  updateStats();
  renderMain();
}

function updateStats() {
  document.getElementById('stat-sel').textContent = partidasSeleccionadas.size;
  let conAvance = 0;
  partidasSeleccionadas.forEach(id => {
    if (avanceData[id] && avanceData[id].length > 0) conAvance++;
  });
  document.getElementById('stat-avance').textContent = conAvance;
}

// ================================================================
// CARGAR AVANCE DESDE FIREBASE
// ================================================================
async function cargarAvancePartida(id) {
  const partida = METRADOS_PARTIDAS.find(p => p.id === id);
  if (!partida) return;

  // Cargar filas del mes actual
  const datos = await fbLoad('metrados_mensuales/' + id + '/' + mesActual, null);
  avanceData[id] = datos ? JSON.parse(JSON.stringify(datos)) : [];

  // Calcular acumulado de meses anteriores
  let acum = 0;
  const parcialKey = partida.tipo === 'acero' ? 'peso' : 'parcial';
  const todosLosMeses = await fbLoad('metrados_mensuales/' + id, {});
  if (todosLosMeses) {
    Object.keys(todosLosMeses).forEach(mes => {
      if (mes < mesActual) {
        const filasMes = todosLosMeses[mes];
        if (Array.isArray(filasMes)) {
          filasMes.forEach(f => { acum += parseFloat(f[parcialKey]) || 0; });
        }
      }
    });
  }
  acumuladoData[id] = acum;

  // Actualizar ícono en sidebar
  const icon = document.getElementById('icon-' + id);
  if (icon) {
    if (avanceData[id].length > 0) {
      icon.textContent = '✅';
    } else {
      icon.textContent = '';
    }
  }

  renderMain();
  updateStats();
}

// ================================================================
// RENDER MAIN PANEL
// ================================================================
function renderMain() {
  const empty = document.getElementById('main-empty');
  const content = document.getElementById('main-content');

  if (partidasSeleccionadas.size === 0) {
    empty.style.display = 'flex';
    content.innerHTML = '';
    return;
  }
  empty.style.display = 'none';
  content.innerHTML = '';

  // Renderizar una card por cada partida seleccionada
  partidasSeleccionadas.forEach(id => {
    const partida = METRADOS_PARTIDAS.find(p => p.id === id);
    if (!partida) return;
    const card = crearCardPartida(partida);
    content.appendChild(card);
  });
}

function getColumnHeaders(partida) {
  if (partida.tipo === 'acero') {
    return [
      { key: 'descripcion', label: 'Descripción', type: 'text' },
      { key: 'diametro', label: 'ø', type: 'text' },
      { key: 'n_estr', label: 'N° Estr.', type: 'number' },
      { key: 'n_elem', label: 'N° Elem', type: 'number' },
      { key: 'n_var', label: 'N° Var.', type: 'number' },
      { key: 'l_varilla', label: 'L Varilla', type: 'number' },
      { key: 'l_total', label: 'L Total', type: 'number' },
      { key: 'peso_m', label: 'Peso/m', type: 'number' },
      { key: 'peso', label: 'Peso', type: 'number' }
    ];
  } else {
    return [
      { key: 'descripcion', label: 'Descripción', type: 'text' },
      { key: 'n_estr', label: 'N° Estr.', type: 'number' },
      { key: 'n_elem', label: 'N° Elem', type: 'number' },
      { key: 'area', label: 'Área', type: 'number' },
      { key: 'largo', label: 'Largo', type: 'number' },
      { key: 'ancho', label: 'Ancho', type: 'number' },
      { key: 'alto', label: 'Alto', type: 'number' },
      { key: 'parcial', label: 'Parcial', type: 'number' }
    ];
  }
}

function crearCardPartida(partida) {
  const filas = avanceData[partida.id] || [];
  const cols = getColumnHeaders(partida);
  const parcialKey = partida.tipo === 'acero' ? 'peso' : 'parcial';
  const acum = acumuladoData[partida.id] || 0;

  // Calcular total mes
  let totalMes = 0;
  filas.forEach(f => { totalMes += parseFloat(f[parcialKey]) || 0; });
  const saldo = partida.metrado_total - acum - totalMes;

  const card = document.createElement('div');
  card.className = 'partida-card';
  card.id = 'card-' + partida.id;

  // Header
  const header = document.createElement('div');
  header.className = 'partida-card-header';
  header.innerHTML = `
    <div>
      <span class="pc-num">${partida.numero}</span>
      <span class="pc-desc" style="margin-left:8px">${partida.descripcion}</span>
    </div>
    <span class="pc-met">${partida.metrado_total} ${partida.unidad}</span>
  `;
  card.appendChild(header);

  // Body
  const body = document.createElement('div');
  body.className = 'partida-card-body';

  // Resumen
  const resumen = document.createElement('div');
  resumen.className = 'avance-resumen';
  resumen.innerHTML = `
    <span>📐 Presupuesto: <strong>${partida.metrado_total.toFixed(2)}</strong></span>
    <span>📊 Acum. anterior: <strong style="color:#1565c0">${acum.toFixed(2)}</strong></span>
    <span>📈 Este mes: <strong style="color:#2e7d32" id="mes-total-${partida.id}">${totalMes.toFixed(2)}</strong></span>
    <span>📉 Saldo: <strong style="color:${saldo < 0 ? '#c62828' : '#555'}" id="saldo-${partida.id}">${saldo.toFixed(2)}</strong></span>
  `;
  body.appendChild(resumen);

  // Botones de acción
  const acciones = document.createElement('div');
  acciones.className = 'acciones-row';

  const btnAdd = document.createElement('button');
  btnAdd.className = 'btn-action btn-add';
  btnAdd.innerHTML = '➕ Agregar Fila';
  btnAdd.addEventListener('click', () => {
    const nuevaFila = {};
    partida.columnas.forEach(c => { nuevaFila[c] = (c === 'descripcion' || c === 'diametro') ? '' : null; });
    if (!avanceData[partida.id]) avanceData[partida.id] = [];
    avanceData[partida.id].push(nuevaFila);
    renderTablaAvance(partida);
  });

  const btnSave = document.createElement('button');
  btnSave.className = 'btn-action btn-save';
  btnSave.innerHTML = '💾 Guardar';
  btnSave.addEventListener('click', () => guardarPartida(partida));

  const btnPres = document.createElement('button');
  btnPres.className = 'btn-action btn-view-pres';
  btnPres.innerHTML = '👁 Ver Presupuesto';
  btnPres.addEventListener('click', () => mostrarPresupuesto(partida));

  acciones.appendChild(btnAdd);
  acciones.appendChild(btnSave);
  acciones.appendChild(btnPres);
  body.appendChild(acciones);

  // Tabla de avance editable
  const tableWrap = document.createElement('div');
  tableWrap.style.cssText = 'overflow-x:auto;border:1px solid #ddd;border-radius:8px';
  const table = document.createElement('table');
  table.className = 'inf-table';
  table.id = 'table-' + partida.id;

  // Thead
  const thead = document.createElement('thead');
  thead.style.background = '#4a148c';
  thead.style.color = '#fff';
  let thRow = '<tr><th style="padding:6px 3px;font-size:.68rem;width:28px">#</th>';
  cols.forEach(c => {
    thRow += `<th style="padding:6px 4px;text-align:${c.type === 'number' ? 'right' : 'left'};font-size:.68rem">${c.label}</th>`;
  });
  thRow += '<th style="padding:6px 3px;font-size:.68rem;width:28px">🗑</th></tr>';
  thead.innerHTML = thRow;
  table.appendChild(thead);

  // Tbody
  const tbody = document.createElement('tbody');
  tbody.id = 'tbody-' + partida.id;
  table.appendChild(tbody);

  // Tfoot
  const tfoot = document.createElement('tfoot');
  tfoot.id = 'tfoot-' + partida.id;
  tfoot.style.cssText = 'background:#f3e5f5;font-weight:700';
  table.appendChild(tfoot);

  tableWrap.appendChild(table);
  body.appendChild(tableWrap);

  // Msg save
  const msg = document.createElement('div');
  msg.className = 'msg-save';
  msg.id = 'msg-' + partida.id;
  msg.textContent = '✅ Guardado correctamente';
  body.appendChild(msg);

  card.appendChild(body);

  // Render filas
  setTimeout(() => renderTablaAvance(partida), 0);

  return card;
}

function renderTablaAvance(partida) {
  const filas = avanceData[partida.id] || [];
  const cols = getColumnHeaders(partida);
  const parcialKey = partida.tipo === 'acero' ? 'peso' : 'parcial';
  const tbody = document.getElementById('tbody-' + partida.id);
  if (!tbody) return;
  tbody.innerHTML = '';

  if (filas.length === 0) {
    tbody.innerHTML = `<tr><td colspan="${cols.length + 2}" style="padding:16px;text-align:center;color:#aaa;font-size:.75rem">Sin filas. Clic en "➕ Agregar Fila"</td></tr>`;
  } else {
    filas.forEach((fila, i) => {
      const tr = document.createElement('tr');
      tr.style.background = i % 2 === 0 ? '#fff' : '#faf5ff';

      // #
      const tdN = document.createElement('td');
      tdN.style.cssText = 'text-align:center;font-size:.68rem;color:#999';
      tdN.textContent = i + 1;
      tr.appendChild(tdN);

      cols.forEach(c => {
        const td = document.createElement('td');
        const inp = document.createElement('input');
        inp.type = c.type === 'number' ? 'number' : 'text';
        inp.step = 'any';
        inp.value = fila[c.key] != null ? fila[c.key] : '';
        inp.dataset.key = c.key;
        inp.dataset.row = i;
        inp.dataset.pid = partida.id;

        if (c.key !== parcialKey && c.type === 'number') {
          inp.addEventListener('input', () => recalcularParcial(partida, i));
        }

        td.appendChild(inp);
        tr.appendChild(td);
      });

      // Delete
      const tdD = document.createElement('td');
      tdD.style.textAlign = 'center';
      const btnD = document.createElement('button');
      btnD.className = 'btn-del-row';
      btnD.textContent = '✕';
      btnD.addEventListener('click', () => {
        avanceData[partida.id].splice(i, 1);
        renderTablaAvance(partida);
      });
      tdD.appendChild(btnD);
      tr.appendChild(tdD);

      tbody.appendChild(tr);
    });
  }

  actualizarTotales(partida);
}

function recalcularParcial(partida, rowIdx) {
  const tbody = document.getElementById('tbody-' + partida.id);
  const tr = tbody.querySelectorAll('tr')[rowIdx];
  if (!tr) return;

  const inputs = tr.querySelectorAll('input');
  const vals = {};
  inputs.forEach(inp => { vals[inp.dataset.key] = parseFloat(inp.value) || 0; });

  if (partida.tipo === 'acero') {
    const lt = vals.n_estr * vals.n_elem * vals.n_var * vals.l_varilla;
    const peso = lt * vals.peso_m;
    const ltInp = tr.querySelector('input[data-key="l_total"]');
    const pesoInp = tr.querySelector('input[data-key="peso"]');
    if (ltInp) ltInp.value = lt ? lt.toFixed(2) : '';
    if (pesoInp) pesoInp.value = peso ? peso.toFixed(2) : '';
  } else {
    let parcial = 0;
    if (vals.area) {
      parcial = vals.n_estr * vals.n_elem * vals.area;
    } else {
      parcial = vals.n_estr * vals.n_elem * vals.largo * vals.ancho * vals.alto;
    }
    const pInp = tr.querySelector('input[data-key="parcial"]');
    if (pInp) pInp.value = parcial ? parcial.toFixed(2) : '';
  }

  actualizarTotales(partida);
}

function actualizarTotales(partida) {
  const parcialKey = partida.tipo === 'acero' ? 'peso' : 'parcial';
  const tbody = document.getElementById('tbody-' + partida.id);
  let totalMes = 0;
  if (tbody) {
    tbody.querySelectorAll('tr').forEach(tr => {
      const inp = tr.querySelector(`input[data-key="${parcialKey}"]`);
      if (inp) totalMes += parseFloat(inp.value) || 0;
    });
  }

  const cols = getColumnHeaders(partida);
  const tfoot = document.getElementById('tfoot-' + partida.id);
  if (tfoot) {
    let html = '<tr><td style="border-top:2px solid #6a1b9a"></td>';
    cols.forEach(c => {
      if (c.key === parcialKey) {
        html += `<td style="padding:6px 4px;text-align:right;font-size:.75rem;border-top:2px solid #6a1b9a;color:#6a1b9a">${totalMes.toFixed(2)} ${partida.unidad}</td>`;
      } else if (c.key === 'descripcion') {
        html += `<td style="padding:6px 4px;font-size:.75rem;border-top:2px solid #6a1b9a">TOTAL MES</td>`;
      } else {
        html += '<td style="border-top:2px solid #6a1b9a"></td>';
      }
    });
    html += '<td style="border-top:2px solid #6a1b9a"></td></tr>';
    tfoot.innerHTML = html;
  }

  // Actualizar resumen
  const mesEl = document.getElementById('mes-total-' + partida.id);
  const saldoEl = document.getElementById('saldo-' + partida.id);
  if (mesEl) mesEl.textContent = totalMes.toFixed(2);
  if (saldoEl) {
    const acum = acumuladoData[partida.id] || 0;
    const saldo = partida.metrado_total - acum - totalMes;
    saldoEl.textContent = saldo.toFixed(2);
    saldoEl.style.color = saldo < 0 ? '#c62828' : '#555';
  }
}

// ================================================================
// GUARDAR
// ================================================================
function guardarPartida(partida) {
  const tbody = document.getElementById('tbody-' + partida.id);
  const filas = [];
  if (tbody) {
    tbody.querySelectorAll('tr').forEach(tr => {
      const inputs = tr.querySelectorAll('input');
      if (inputs.length === 0) return;
      const fila = {};
      inputs.forEach(inp => {
        const key = inp.dataset.key;
        if (inp.type === 'number') {
          fila[key] = inp.value ? parseFloat(inp.value) : null;
        } else {
          fila[key] = inp.value || '';
        }
      });
      filas.push(fila);
    });
  }

  avanceData[partida.id] = filas;
  fbSave('metrados_mensuales/' + partida.id + '/' + mesActual, filas);

  // Msg
  const msg = document.getElementById('msg-' + partida.id);
  if (msg) { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 3000); }

  // Ícono sidebar
  const icon = document.getElementById('icon-' + partida.id);
  if (icon) icon.textContent = filas.length > 0 ? '✅' : '';

  updateStats();
  actualizarTotales(partida);
}

// ================================================================
// MODAL: Ver presupuesto
// ================================================================
function initModal() {
  document.getElementById('btn-close-modal').addEventListener('click', () => {
    document.getElementById('modal-pres').classList.remove('show');
  });
  document.getElementById('modal-pres').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
  });
}

function mostrarPresupuesto(partida) {
  const modal = document.getElementById('modal-pres');
  document.getElementById('modal-pres-title').textContent = '📐 ' + partida.numero + ' — ' + partida.descripcion;

  const body = document.getElementById('modal-pres-body');
  const cols = getColumnHeaders(partida);
  const parcialKey = partida.tipo === 'acero' ? 'peso' : 'parcial';

  let html = '<div style="overflow-x:auto"><table class="inf-table" style="width:100%">';
  // Header
  html += '<thead style="background:#1a237e;color:#fff"><tr>';
  cols.forEach(c => {
    html += `<th style="padding:7px 5px;text-align:${c.type === 'number' ? 'right' : 'left'};font-size:.72rem">${c.label}</th>`;
  });
  html += '</tr></thead><tbody>';

  // Filas
  partida.detalle.forEach((fila, i) => {
    html += `<tr style="background:${i % 2 === 0 ? '#fff' : '#f5f5f5'}">`;
    cols.forEach(c => {
      const val = fila[c.key];
      const txt = val != null ? (typeof val === 'number' ? (Number.isInteger(val) ? val : val.toFixed(2)) : val) : '';
      html += `<td style="padding:4px 5px;text-align:${c.type === 'number' ? 'right' : 'left'};font-size:.72rem;border-bottom:1px solid #eee">${txt}</td>`;
    });
    html += '</tr>';
  });

  // Total
  html += '<tr style="background:#e8eaf6;font-weight:700">';
  cols.forEach(c => {
    if (c.key === parcialKey) {
      html += `<td style="padding:7px 5px;text-align:right;font-size:.78rem;border-top:2px solid #1a237e">${partida.metrado_total.toFixed(2)} ${partida.unidad}</td>`;
    } else if (c.key === 'descripcion') {
      html += `<td style="padding:7px 5px;font-size:.78rem;border-top:2px solid #1a237e">TOTAL</td>`;
    } else {
      html += '<td style="border-top:2px solid #1a237e"></td>';
    }
  });
  html += '</tr></tbody></table></div>';

  // Resumen de acero si existe
  if (partida.resumen && partida.resumen.length > 0) {
    html += '<h4 style="margin:14px 0 6px;font-size:.78rem;color:#555">📊 Resumen por Diámetro</h4>';
    html += '<table class="inf-table" style="width:auto"><thead style="background:#555;color:#fff"><tr>';
    html += '<th style="padding:5px 10px;font-size:.72rem">ø</th>';
    html += '<th style="padding:5px 10px;font-size:.72rem;text-align:right">L Total</th>';
    html += '<th style="padding:5px 10px;font-size:.72rem;text-align:right">Peso/m</th>';
    html += '<th style="padding:5px 10px;font-size:.72rem;text-align:right">Peso</th>';
    html += '</tr></thead><tbody>';
    partida.resumen.forEach((r, i) => {
      html += `<tr style="background:${i%2===0?'#fff':'#f5f5f5'}">`;
      html += `<td style="padding:4px 10px;font-size:.72rem">${r.diametro}</td>`;
      html += `<td style="padding:4px 10px;text-align:right;font-size:.72rem">${r.l_total.toFixed(2)}</td>`;
      html += `<td style="padding:4px 10px;text-align:right;font-size:.72rem">${r.peso_m}</td>`;
      html += `<td style="padding:4px 10px;text-align:right;font-size:.72rem">${r.peso.toFixed(2)}</td>`;
      html += '</tr>';
    });
    html += '</tbody></table>';
  }

  body.innerHTML = html;
  modal.classList.add('show');
}
